# ~/.tmux.conf — native-feeling setup, tuned for the agent fleet.

# --- core behavior ---
set -g mouse on                      # scroll, click panes/windows, drag borders
set -g history-limit 50000           # deep scrollback for long agent runs
set -g base-index 1                  # windows start at 1 (matches the number row)
setw -g pane-base-index 1
set -g renumber-windows on           # no gaps after closing a window
set -g focus-events on               # let apps (nvim, claude) see focus changes
set -sg escape-time 10               # snappy ESC, no lag in TUI apps
# Fit the session to the client that just connected: size the session to the
# most-recently-attached client, and each window to the smallest client actively
# viewing it — so a new terminal attaching snaps the layout to its size instead
# of staying pinned to the first (or largest) client.
set -g window-size latest
# aggressive-resize sizes each window only to the client currently VIEWING it. Under
# cmux/iTerm tmux -CC control mode every window is a tab, so background tabs never get
# resized and stay 80x24 — the TUI (claude) then draws for 80x24 and won't fill the pane.
# Off = all windows track the attached client's size, so every tab renders full-size.
setw -g aggressive-resize off
set -g set-clipboard on              # OSC52: carries yanks back over SSH to your laptop
# copy-command: first available clipboard tool wins (macOS pbcopy / Wayland / GPaste)
if-shell 'command -v pbcopy >/dev/null'         'set -g copy-command "pbcopy"'          ''
if-shell 'command -v wl-copy >/dev/null'        'set -g copy-command "wl-copy"'         ''
if-shell 'command -v gpaste-client >/dev/null'  'set -g copy-command "gpaste-client add"' ''
setw -g mode-keys vi                 # vi keys in copy mode

# truecolor + italics (matches the desktop terminal)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm*:Tc"

# --- keys that feel native ---
# Ctrl-b then r reloads this file.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
# Intuitive splits that keep the current dir; | and - are easy to remember.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# Ctrl+arrows switch windows without the prefix.
bind -n C-Right next-window
bind -n C-Left  previous-window
# Drag-select + y to copy, like a normal editor.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# Double-click a word / triple-click a line to copy.
bind -T copy-mode-vi DoubleClick1Pane send -X select-word \; send -X copy-selection-and-cancel
# Mouse wheel enters copy-mode and scrolls; exiting drops you back at the prompt.

# --- appearance: a calm, legible dark bar ---
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1b1d24,fg=#8a90a0"

# left: session name in a pill
set -g status-left-length 24
set -g status-left "#[bg=#7aa2f7,fg=#1b1d24,bold] ❯ #S #[bg=#1b1d24,fg=#7aa2f7]▎ "

# right: host + clock, muted
set -g status-right-length 60
set -g status-right "#[fg=#565f7a]#H #[fg=#3b4261]│ #[fg=#8a90a0]%a %d %b #[fg=#c0caf5,bold]%H:%M "

# windows: agent name, current one highlighted; dead panes flagged red
setw -g window-status-format "#[fg=#565f7a] #I #[fg=#8a90a0]#W#{?pane_dead,#[fg=#f7768e] ✗,} "
setw -g window-status-current-format "#[bg=#2a2e3a,fg=#7aa2f7,bold] #I #[fg=#c0caf5]#W#{?pane_dead,#[fg=#f7768e] ✗,} #[default]"
setw -g window-status-separator ""

# quiet, thin pane borders; active one glows
set -g pane-border-style "fg=#2a2e3a"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-lines single
# label each pane on its top border with the stable agent tag (falls back to title)
set -g pane-border-status top
set -g pane-border-format " #{?#{@agent},#[fg=#7aa2f7]#{@agent},#[fg=#565f7a]#{pane_title}} #[default]"

# subtle message / mode colors
set -g message-style "bg=#7aa2f7,fg=#1b1d24,bold"
set -g mode-style "bg=#3b4261,fg=#c0caf5"

# keep dead agent panes visible instead of vanishing (fleet.sh also sets this)
setw -g remain-on-exit on
